services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-explainer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-explainer}
      POSTGRES_DB: ${POSTGRES_DB:-codebase_explainer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U explainer -d codebase_explainer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-explainer}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://explainer:explainer@postgres:5432/codebase_explainer
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: explainer
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REPOS_DIR: /data/repos
      INDEX_DIR: /data/indexes
      METADATA_DIR: /data/metadata
      DELETE_CLONE_AFTER_INDEX: "true"
      MAX_REPO_SIZE_MB: 500
      MAX_FILE_COUNT: 5000
      RATE_LIMIT_PER_MINUTE: 60
    volumes:
      - repo_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  repo_data:
